<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTS // ROSTER</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hazard-stripe"></div>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand"><span>FTS</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Index</a></li>
      <li><a href="members.html" class="active">Roster</a></li>
    </ul>
  </div>
</nav>

<main>

<section class="roster-header">
  <div class="roster-meta">
    CLASSIFIED // <span>EYES ONLY</span> // PERSONNEL FILE
  </div>
  <h1 class="roster-title">The Roster</h1>
  <div class="roster-stats" id="rosterStats">
    <!-- stats go here, populated by JS -->
  </div>
</section>

<section class="dossier-grid" id="dossierGrid">
  <!-- member cards go here, populated by JS -->
</section>

</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-mark">FTS</div>
    <div class="footer-text">EST. 2026 // STAY UNGOVERNABLE</div>
    <div class="footer-stamp">UNIT 001</div>
  </div>
</footer>

<script>
  // =============================================
  // ADD MEMBERS HERE
  // To add a new member, copy a block and paste it.
  // Make sure each block ends with a comma.
  // =============================================
  const members = [
    {
      id: "001",
      username: "8rahski",
      tag: "FOUNDER",
      status: "ACTIVE",
      quote: "Started the whole thing. Don't ask questions."
    }
    // Example for adding more later:
    // ,{
    //   id: "002",
    //   username: "TheirMcName",
    //   tag: "MEMBER",
    //   status: "ACTIVE",
    //   quote: "Their tag line."
    // }
  ];

  // ----- don't edit below this line unless you know what you're doing -----

  const grid = document.getElementById('dossierGrid');
  const statsEl = document.getElementById('rosterStats');

  const totalCount = members.length;
  const activeCount = members.filter(m => m.status === 'ACTIVE').length;

  statsEl.innerHTML = `
    <div class="stat">
      <div class="stat-label">Total Operatives</div>
      <div class="stat-value">${String(totalCount).padStart(3, '0')}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Active Status</div>
      <div class="stat-value">${String(activeCount).padStart(3, '0')}</div>
    </div>
    <div class="stat">
      <div class="stat-label">Year Established</div>
      <div class="stat-value">2026</div>
    </div>
  `;

  if (members.length === 0) {
    grid.innerHTML = '<div class="empty">NO OPERATIVES ON FILE</div>';
  } else {
    members.forEach(m => {
      const card = document.createElement('article');
      card.className = 'dossier';
      const statusClass = m.status === 'ACTIVE' ? 'status-active' : 'status-inactive';
      card.innerHTML = `
        <header class="dossier-header">
          <span class="dossier-id">${m.id}</span>
          <span class="${statusClass}">${m.status}</span>
        </header>
        <div class="dossier-body">
          <div class="skin-frame">
            <img src="https://mc-heads.net/avatar/${m.username}/96"
                 alt="${m.username}'s head"
                 class="skin-head"
                 onerror="this.src='https://mc-heads.net/avatar/MHF_Steve/96'"
                 loading="lazy">
          </div>
          <div class="dossier-info">
            <h2 class="username">${m.username}</h2>
            <span class="tag">${m.tag}</span>
            <p class="quote">${m.quote}</p>
          </div>
        </div>
        <footer class="dossier-footer">
          <span>FTS / ${m.id}</span>
          <span>VERIFIED ✓</span>
        </footer>
      `;
      grid.appendChild(card);
    });
  }
</script>

</body>
</html>
